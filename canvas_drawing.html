<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>드로잉 — 아트플로우</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
<style>
body { overflow: hidden; font-family: 'Pretendard', sans-serif; }

/* ── 번쩍 오버레이 ── */
#flash-overlay {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9990;
  opacity: 0; background: rgba(255,255,255,0.9);
}
@keyframes do-flash { 0%{opacity:.9} 100%{opacity:0} }
#flash-overlay.flash { animation: do-flash 0.5s ease-out forwards; }

/* ── 코치 알럿 ── */
#coach-alert {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.85);
  background: #fff; border-radius: 24px;
  padding: 28px 28px 20px;
  z-index: 9999; width: min(320px, 92vw);
  box-shadow: 0 24px 60px rgba(0,0,0,0.16);
  text-align: center;
  opacity: 0; pointer-events: none;
  transition: transform .3s cubic-bezier(.32,.72,0,1), opacity .25s;
}
#coach-alert.show { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
#alert-icon  { font-size: 2.6rem; margin-bottom: 10px; }
#alert-msg   { font-size: .95rem; font-weight:700; color:var(--text); line-height:1.6; margin-bottom:18px; white-space:pre-line; }
#alert-close {
  width:100%; background: linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:50px;
  padding:10px; font-size:.9rem; font-weight:700; cursor:pointer;
}

/* ── 색상환 팝업 ── */
#color-picker {
  position: fixed; z-index: 500;
  background: #fff; border-radius: 16px;
  padding: 14px; padding-top: 36px; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  border: 1px solid var(--border);
  display: none; flex-direction: column; align-items: center;
}
#color-picker.open { display: flex; }
#color-wheel { border-radius: 50%; cursor: crosshair; display: block; }
#picker-bri {
  width: 160px; height: 12px;
  -webkit-appearance: none; appearance: none; border-radius: 6px; outline: none; cursor: pointer;
}
#picker-bri::-webkit-slider-thumb {
  -webkit-appearance: none; width:18px; height:18px; border-radius:50%;
  background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.25); cursor:pointer;
}
.picker-row { display:flex; align-items:center; gap:8px; width:100%; }
#picker-preview { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; }
#picker-apply {
  flex:1; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:50px;
  padding:7px; font-size:.8rem; font-weight:700; cursor:pointer;
}

/* ── 전체 레이아웃 ── */
.dp-root {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden; background: var(--bg);
}

/* ── 상단: 감정 스코어 헤더 ── */
.score-header {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px;
  background: var(--bg);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
#sh-thumb {
  width: 54px; height: 54px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,.15);
}
.sh-bar-wrap { flex:1; min-width:0; }
.sh-bar-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 7px;
}
#sh-bar-text {
  font-size: 1.05rem; font-weight:900; letter-spacing:.02em;
  background: linear-gradient(90deg, var(--accent), var(--accent2), #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sh-bar-hint { font-size:.68rem; font-weight:600; color:var(--text2); }
.sh-bar-track {
  height: 16px; background: var(--bg3);
  border-radius: 8px; overflow: hidden;
}
.sh-bar-fill {
  height:100%; border-radius:8px; width:0%;
  transition: width .7s cubic-bezier(.32,.72,0,1);
  position: relative;
}
.sh-bar-fill::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg,rgba(255,255,255,.30) 0%,transparent 100%);
}
.sh-pct { font-size:1.2rem; font-weight:900; flex-shrink:0; min-width:46px; text-align:right; }
.sh-finish {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:22px;
  padding:11px 20px; font-size:.92rem; font-weight:700;
  cursor:pointer; flex-shrink:0; white-space:nowrap;
}

/* ── 낙서 감지 팝업 ── */
.scribble-overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.55); backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
  align-items:center; justify-content:center;
}
.scribble-overlay.open { display:flex; }
.scribble-box {
  background:#fff; border-radius:24px;
  padding:36px 28px 28px; max-width:300px; width:88%;
  text-align:center; box-shadow:0 12px 48px rgba(0,0,0,0.22);
  animation:fadeUp .25s ease;
}
.scribble-icon { font-size:2.8rem; margin-bottom:10px; }
.scribble-title {
  font-size:1.5rem; font-weight:900; color:var(--text); margin-bottom:12px;
}
.scribble-msg {
  font-size:.9rem; color:var(--text2); line-height:1.75; margin-bottom:26px;
}
.scribble-actions { display:flex; flex-direction:column; gap:10px; }
.scribble-actions .btn { width:100%; font-size:.9rem; padding:13px; }

/* ── 본문 ── */
.draw-body { display:flex; flex:1; min-height:0; overflow:hidden; }

/* ── 좌측 패널 ── */
.left-panel {
  width: 90px; flex-shrink:0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow-y: auto; overflow-x: hidden;
}
.lp-section { padding:10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.color-section { flex-shrink:0; }
.sec-label {
  font-size:.6rem; font-weight:800; text-transform:uppercase;
  color:var(--text2); letter-spacing:.07em; margin-bottom:7px;
}
#ref-img {
  width:100%; border-radius:10px; object-fit:cover; display:block;
  box-shadow:0 2px 10px rgba(0,0,0,.08); aspect-ratio:4/3;
}
.layer-item {
  border-radius:9px; padding:7px 9px;
  display:flex; align-items:center; gap:7px;
  cursor:pointer; border:1.5px solid transparent;
  transition:background .15s, border-color .15s; margin-bottom:3px;
}
.layer-item:hover { background:var(--bg3); }
.layer-item.active { background:var(--surface); border-color:var(--accent); }
.l-swatch { width:18px; height:18px; border-radius:5px; flex-shrink:0; box-shadow:0 1px 3px rgba(0,0,0,.12); }
.l-name { font-size:.73rem; font-weight:600; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.palette-dots { display:grid; grid-template-columns: 1fr 1fr; gap:7px; padding:2px; }
.pal-dot {
  width:30px; height:30px; border-radius:50%;
  border:3px solid rgba(255,255,255,0.8); cursor:pointer;
  transition:transform .18s cubic-bezier(.32,.72,0,1), box-shadow .18s;
  box-shadow:0 2px 8px rgba(0,0,0,.18), inset 0 1px 2px rgba(255,255,255,.35);
  position:relative; justify-self:center;
}
.pal-dot::after {
  content:''; position:absolute; top:4px; left:5px;
  width:8px; height:5px; border-radius:50%;
  background:rgba(255,255,255,.45);
  transform:rotate(-30deg);
}
.pal-dot:hover { transform:scale(1.22); box-shadow:0 4px 14px rgba(0,0,0,.22), inset 0 1px 2px rgba(255,255,255,.4); }
.pal-dot.active {
  border-color:#fff; transform:scale(1.15);
  box-shadow:0 0 0 3px var(--accent), 0 4px 12px rgba(0,0,0,.2), inset 0 1px 2px rgba(255,255,255,.35);
}

.my-color-row { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:6px; }
#custom-color-preview {
  width:32px; height:32px; border-radius:50%; background:#ffffff;
  border:2.5px solid var(--border); cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
  flex-shrink:0; transition:transform .15s, border-color .15s;
}
#custom-color-preview:hover { transform:scale(1.18); border-color:var(--accent); }

/* ── 캔버스 ── */
.canvas-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:12px; padding-bottom:62px; min-width:0; overflow:hidden;
  background:var(--bg3); position:relative;
}
.canvas-stack {
  position:relative; border-radius:14px; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  cursor:crosshair; touch-action:none;
  transform-origin:center center;
  transition:transform .1s ease;
  will-change:transform;
}
.canvas-stack.pan-mode { cursor:grab; }
.canvas-stack.pan-mode:active { cursor:grabbing; }
.canvas-stack canvas { position:absolute; top:0; left:0; display:block; }
#event-canvas    { position:absolute; inset:0; z-index:100; background:transparent; border-radius:14px; }
#composite-canvas{ position:relative; z-index:1; background:#fff; border-radius:14px; }
#outline-overlay {
  position:absolute; inset:0; z-index:50;
  width:100%; height:100%;
  mix-blend-mode: multiply;
  pointer-events:none;
  border-radius:14px;
  display:none;
}

/* ── 줌 컨트롤 ── */
.zoom-controls {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:5px; z-index:200;
  background:rgba(255,255,255,.92); border-radius:20px;
  padding:5px 8px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  backdrop-filter:blur(6px);
}
.zoom-btn {
  width:32px; height:32px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  font-size:1rem; font-weight:800; color:var(--text);
  display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.zoom-btn:hover { background:var(--bg3); }
.zoom-btn.active { background:var(--accent); color:#fff; }
#zoom-label {
  width:42px; font-size:.7rem; font-weight:700; color:var(--text2);
  cursor:pointer; border-radius:12px;
}

/* ── AI 튜터 플로팅 오버레이 (캔버스 우측 상단 / 모바일: 줌 컨트롤 위) ── */
.tutor-overlay {
  position:absolute; top:14px; right:14px; z-index:200;
  display:flex; flex-direction:column; align-items:flex-end;
  pointer-events:none;
}
.tutor-overlay .tutor-float {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  animation: bob 3.5s ease-in-out infinite;
  pointer-events:auto;
}
/* 모바일: 우측 하단, 말풍선은 왼쪽 */
@media (max-width:600px) {
  .tutor-overlay {
    top: auto;
    bottom: 58px;
    right: 14px;
    transform: none;
    align-items: flex-end;
    flex-direction: row-reverse;  /* 아바타 오른쪽, 말풍선 왼쪽 */
    gap: 8px;
    display: flex !important;
  }
  .tutor-overlay .tutor-float {
    animation: none;
    flex-direction: row-reverse;
    align-items: flex-end;
    gap: 8px;
  }
  .tutor-avatar-wrap {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: flex !important;
  }
  .tutor-live { top: 2px; right: 2px; width: 10px; height: 10px; }
  .tutor-bubbles {
    width: auto !important;
    max-width: calc(100vw - 100px);
    align-items: flex-end;
  }
  .t-bubble {
    text-align: left;
    border-radius: 16px 16px 16px 4px;  /* 왼쪽 말풍선 꼬리 */
    font-size: .78rem;
  }
}

/* ── 단계 패널 ── */
.step-panel {
  position:absolute; bottom:62px; right:14px; top:auto; transform:none; z-index:200;
  width:180px;
  background:rgba(255,255,255,0.97);
  border-radius:20px;
  padding:16px 14px 14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.13);
  border:1.5px solid var(--border);
  pointer-events:auto;
}
.step-track {
  display:flex; align-items:center; gap:6px; margin-bottom:12px;
}
.step-dot {
  width:28px; height:28px; border-radius:50%;
  border:2px solid var(--border);
  font-size:.75rem; font-weight:900; color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .25s;
  cursor:default;
}
.step-dot.done { background:var(--accent); border-color:var(--accent); color:#fff; }
.step-dot.reachable { cursor:pointer; }
.step-dot.reachable:hover { opacity:.75; transform:scale(1.1); }
.step-dot.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; box-shadow:0 0 0 4px rgba(124,110,247,.2); }
.step-line { flex:1; height:3px; background:var(--border); border-radius:2px; }
.step-line.done { background:var(--accent); }
.step-body {}
.step-title {
  font-size:.92rem; font-weight:900; color:var(--text);
  margin-bottom:5px;
}
.step-desc {
  font-size:.78rem; color:var(--text2); line-height:1.6; margin-bottom:10px;
}
.step-next-btn {
  width:100%; padding:9px 0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:20px;
  font-size:.82rem; font-weight:700; cursor:pointer;
  transition:opacity .15s, transform .15s;
}
.step-next-btn:disabled { opacity:.35; pointer-events:none; }
.step-next-btn:active { transform:scale(.97); }
.step-score-hint {
  font-size:.72rem; color:var(--accent); font-weight:700;
  text-align:center; margin-bottom:6px; min-height:16px;
  line-height:1.6;
}

/* 모바일: 단계 패널 하단 우측 */
@media (max-width:600px) {
  .step-panel {
    position:fixed;
    top:auto; right:10px; transform:none;
    bottom:58px;
    width:140px;
    padding:10px;
    font-size:.9em;
  }
}

/* ── 우측 도구 컬럼 ── */
.tutor-col {
  width:70px; flex-shrink:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:14px 6px 16px; overflow:visible;
  background:var(--bg2); border-left:1px solid var(--border);
}
.finish-btn {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; border-radius:20px;
  padding:12px 0; font-size:.88rem; font-weight:700;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.tutor-float {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  animation: bob 3.5s ease-in-out infinite;
  width:100%;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.tutor-avatar-wrap {
  width:150px; height:150px;
  background:transparent;
  display:flex; align-items:center; justify-content:center;
  position:relative; flex-shrink:0;
}
.tutor-avatar-wrap img {
  width:100%; height:100%; object-fit:contain;
}
.tutor-live {
  position:absolute; top:8px; right:8px;
  width:14px; height:14px; border-radius:50%;
  background:#69ff9c; border:2px solid #fff;
  box-shadow:0 0 8px #69ff9c;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
/* 말풍선 */
.tutor-bubbles {
  width:220px; display:flex; flex-direction:column; gap:6px;
  pointer-events:none; margin-bottom:8px;
  align-items:flex-end;
}
.t-bubble {
  background:#fff; border-radius:16px 16px 4px 16px;
  padding:11px 14px; font-size:.85rem; font-weight:600;
  color:var(--text); line-height:1.5;
  box-shadow:0 4px 18px rgba(0,0,0,.14);
  border:1px solid var(--border);
  animation: bubble-in .3s cubic-bezier(.32,.72,0,1);
  width:100%; text-align:right;
}
@keyframes bubble-in { from{opacity:0;transform:translateY(6px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ── 좌측 패널 하단 도구 ── */
.lp-tools {
  padding:10px 10px 14px; display:flex; flex-direction:column; align-items:center; gap:10px;
  border-top:1px solid var(--border); flex-shrink:0;
}
/* 세로 둥근 붓 슬라이더 */
.brush-wrap {
  position:relative;
  display:flex; align-items:center; justify-content:center;
  height:75px; width:20px;
}
#brush-slider {
  writing-mode: vertical-lr;
  direction: rtl;
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 75px;
  background: transparent; outline:none; border:none; cursor:pointer;
  position:relative; z-index:2;
}
#brush-slider::-webkit-slider-runnable-track {
  background: transparent;
}
.brush-taper {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  pointer-events:none;
}
#brush-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--accent); box-shadow:0 2px 8px rgba(124,110,247,.5);
  cursor:pointer;
}
/* 도구 버튼 열 */
.tool-row { display:flex; flex-direction:column; align-items:center; gap:8px; }
.brush-dot { border-radius:50%; background:var(--text); transition:width .15s, height .15s; }
.tool-btn {
  width:40px; height:40px; border-radius:12px;
  background:var(--bg); border:1.5px solid var(--border);
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, border-color .15s; position:relative;
  padding:0;
}
.tool-btn img { width:24px; height:24px; object-fit:contain; }
.tool-btn:hover { background:var(--bg3); }
.tool-btn.active { background:var(--surface); border-color:var(--accent); }

/* 🎵 음악 활성 애니메이션 */
@keyframes music-pulse {
  0%,100% { transform:scale(1);    box-shadow:0 0 0 0 rgba(124,110,247,0); }
  50%      { transform:scale(1.13); box-shadow:0 0 12px 4px rgba(124,110,247,0.35); }
}
@keyframes music-hue {
  0%   { filter:hue-rotate(0deg)   brightness(1.05); }
  33%  { filter:hue-rotate(60deg)  brightness(1.12); }
  66%  { filter:hue-rotate(150deg) brightness(1.08); }
  100% { filter:hue-rotate(0deg)   brightness(1.05); }
}
#btn-music.music-on {
  animation: music-pulse 1.6s ease-in-out infinite,
             music-hue   4s   linear        infinite;
  border: none !important;
}
.tool-btn.locked { opacity:.5; cursor:not-allowed; pointer-events:none; }
.pro-tag {
  position:absolute; top:-7px; right:-7px;
  background:linear-gradient(135deg,#fbbf24,#f97316);
  color:#fff; font-size:.44rem; font-weight:900;
  padding:2px 5px; border-radius:8px; letter-spacing:.04em; white-space:nowrap;
}

/* 우측 패널 숨김 */
.right-panel { display:none; }

/* 튜터 컬럼 내 도구 영역 */
.tutor-tools {
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.current-color-dot {
  width:32px; height:32px; border-radius:50%;
  border:2.5px solid var(--border);
  box-shadow:0 2px 6px rgba(0,0,0,.15);
  flex-shrink:0;
}

@media (max-width:700px) {
  .score-header { padding:8px 12px; gap:10px; }
  #sh-thumb { width:44px; height:44px; }
  #sh-bar-text { font-size:.88rem; }
  .sh-bar-track { height:13px; }
  .sh-pct { font-size:1rem; min-width:36px; }
  .sh-finish { padding:9px 14px; font-size:.82rem; }
}
@media (max-width:600px) {
  /* 좌측 패널 → 하단 가로 바로 전환 */
  .draw-body { flex-direction: column; }
  .left-panel {
    width: 100% !important;
    height: auto;
    flex-direction: row;
    border-right: none;
    border-top: 1px solid var(--border);
    justify-content: flex-start;   /* 1. 좌우 잘림 방지: 왼쪽 정렬 + 스크롤 */
    align-items: center;
    padding: 8px 10px;
    gap: 8px;
    flex-shrink: 0;
    overflow-x: auto;              /* 1. 넘치면 가로 스크롤 */
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .lp-section {
    padding: 0;
    border-bottom: none;
    border-right: 1px solid var(--border);
    padding-right: 8px;

<script>
const MAX_UNDO = 20;
const artwork  = getArtwork();
const emotion  = getEmotion();
if (!artwork || !emotion) location.href = 'choosing_drawing.html';

/* ────────────────────────────────── 상태 */
const S = {
  palette: [], color: '#fff',
  brushSize: 6, erasing: false,
  stepLayerCanvases: [], stepLayerCtxs: [], stepUndoStacks: [],
  // legacy (kept for renderLayers no-op compatibility)
  activeLayerIdx: 0, layerCanvases: [], layerCtxs: [], layerVisible: [], undoStacks: [],
  stats: {
    strokeCount: 0, colorChanges: 0,
    usedColors: new Set(), avgSpeed: 0,
    lastAlertAt: 0,
    patternStrokeCount: 0, // 짧은 획(dist<30) 개수
    lastStrokeSpeed: 0,
  },
};
let drawing = false, lx = 0, ly = 0, lmt = 0;
let compositeCanvas, compositeCtx, eventCanvas;
let alertTO = null;
let pickedColor = '#ffffff';
let emotionScore = 0;
let strokeDist = 0, strokeStartTime = 0;

/* ────────────────────────────────── 줌 / 팬 */
let zoom = 1, panX = 0, panY = 0, panMode = false;
let isPanning = false, panLx = 0, panLy = 0;
let pinchStartDist = 0, pinchStartZoom = 1, pinchStartPanX = 0, pinchStartPanY = 0, pinchMidStartX = 0, pinchMidStartY = 0;

function applyTransform() {
  const stack = document.getElementById('canvas-stack');
  stack.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
}
function zoomIn()  { zoom = Math.min(4, +(zoom + 0.25).toFixed(2)); applyTransform(); }
function zoomOut() { zoom = Math.max(0.5, +(zoom - 0.25).toFixed(2)); if (zoom <= 1) { panX = 0; panY = 0; } applyTransform(); }
function resetZoom() { zoom = 1; panX = 0; panY = 0; applyTransform(); }
function togglePan() {
  panMode = !panMode;
  document.getElementById('btn-pan').classList.toggle('active', panMode);
  document.getElementById('canvas-stack').classList.toggle('pan-mode', panMode);
}

// 마우스 휠 줌
document.getElementById('canvas-area').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.15 : -0.15;
  zoom = Math.max(0.5, Math.min(4, +(zoom + delta).toFixed(2)));
  if (zoom <= 1) { panX = 0; panY = 0; }
  applyTransform();
}, { passive: false });

// 마우스 팬 (pan 모드일 때)
document.getElementById('canvas-area').addEventListener('mousedown', e => {
  if (!panMode) return;
  isPanning = true; panLx = e.clientX; panLy = e.clientY;
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX += e.clientX - panLx; panY += e.clientY - panLy;
  panLx = e.clientX; panLy = e.clientY;
  applyTransform();
});
document.addEventListener('mouseup', () => { isPanning = false; });

// 터치 핀치 줌 + 팬 (capture phase: 2손가락이면 그리기 차단)
document.getElementById('canvas-area').addEventListener('touchstart', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault(); e.stopPropagation();
  const [t1, t2] = e.touches;
  pinchStartDist  = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  pinchStartZoom  = zoom;
  pinchStartPanX  = panX; pinchStartPanY = panY;
  pinchMidStartX  = (t1.clientX + t2.clientX) / 2;
  pinchMidStartY  = (t1.clientY + t2.clientY) / 2;
}, { capture: true, passive: false });

document.getElementById('canvas-area').addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault(); e.stopPropagation();
  const [t1, t2] = e.touches;
  const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  zoom = Math.max(0.5, Math.min(4, +(pinchStartZoom * dist / pinchStartDist).toFixed(2)));
  const midX = (t1.clientX + t2.clientX) / 2;
  const midY = (t1.clientY + t2.clientY) / 2;
  panX = pinchStartPanX + (midX - pinchMidStartX);
  panY = pinchStartPanY + (midY - pinchMidStartY);
  applyTransform();
}, { capture: true, passive: false });

/* ────────────────────────────────── 초기화 */
function init() {
  // Score 헤더 + 정적 버튼 텍스트
  document.getElementById('sh-bar-text').textContent = `${emotion.icon} ${t('draw.scoreText', tEmotion(emotion.id))}`;
  document.getElementById('btn-finish').textContent  = t('draw.finish');
  document.getElementById('btn-outline').textContent = t('draw.sketchShow');
  const _mtEl = document.getElementById('music-tooltip-text');
  if (_mtEl) _mtEl.innerHTML = t('draw.musicTooltip');
  document.getElementById('sh-fill').style.background = emotion.gradient;
  document.getElementById('sh-fill').style.width = '0%';
  document.getElementById('sh-pct').style.color  = emotion.color;
  document.getElementById('sh-pct').textContent  = '0%';

  // 팔레트 (감정별 커스텀 팔레트 우선 사용)
  const emotionImg = artwork.emotionImages?.[emotion.id];
  S.palette  = emotionImg
    ? emotionImg.palette
    : artwork.layers.map((l, i) => emotion.transform(l.color, i));
  S.color    = '#000000';
  const dot = document.getElementById('current-color-dot');
  if (dot) dot.style.background = S.color;
  S.brushSize = emotion.defaultBrush;
  document.getElementById('brush-slider').value = S.brushSize;
  updateBrushDot();

  // 상단 썸네일 (마음 샘플 이미지)
  const sampleImg = artwork.emotionImages?.[emotion.id];
  const thumbSrc = sampleImg ? sampleImg.url : artwork.imageUrl;
  document.getElementById('sh-thumb').src = thumbSrc;

  // 캔버스 크기
  requestAnimationFrame(() => {
    const area = document.getElementById('canvas-area');
    const isMobile = window.innerWidth <= 600;
    // 모바일: 튜터 말풍선 영역(~80px) + 줌컨트롤(~50px) 겹침 방지
    const SIZE = isMobile
      ? Math.max(200, Math.min(area.clientWidth - 16, area.clientHeight - 140))
      : Math.max(240, Math.min(area.clientWidth - 24, area.clientHeight - 24, 520));

    const stack = document.getElementById('canvas-stack');
    stack.style.width = stack.style.height = SIZE + 'px';

    compositeCanvas = document.getElementById('composite-canvas');
    compositeCanvas.width = compositeCanvas.height = SIZE;
    compositeCanvas.style.width = compositeCanvas.style.height = SIZE + 'px';
    compositeCtx = compositeCanvas.getContext('2d');

    stack.querySelectorAll('.layer-canvas').forEach(c => c.remove());
    S.stepLayerCanvases = []; S.stepLayerCtxs = []; S.stepUndoStacks = [];

    // 단계별 레이어 3개 생성 (step1=스케치, step2=채우기, step3=꾸미기)
    for (let i = 0; i < 3; i++) {
      const cvs = document.createElement('canvas');
      cvs.className = 'layer-canvas';
      cvs.width = cvs.height = SIZE;
      cvs.style.cssText = `width:${SIZE}px;height:${SIZE}px;position:absolute;top:0;left:0;z-index:${10+i};pointer-events:none;`;
      stack.insertBefore(cvs, document.getElementById('event-canvas'));
      S.stepLayerCanvases.push(cvs);
      S.stepLayerCtxs.push(cvs.getContext('2d'));
      S.stepUndoStacks.push([]);
    }

    eventCanvas = document.getElementById('event-canvas');
    eventCanvas.width = eventCanvas.height = SIZE;
    eventCanvas.style.width = eventCanvas.style.height = SIZE + 'px';

    loadOutline();
    renderComposite();
    bindDraw();
    renderPalette();
    drawColorWheel();
    initSteps();
    setTimeout(() => {
      addBubble(t('draw.initBubble', tEmotion(emotion.id)));
      S.stats.lastAlertAt = Date.now();
    }, 800);
  });
}

/* ────────────────────────────────── 도안 이미지 */
let outlineImg = null;
let outlineVisible = true;
function toggleOutline() {
  outlineVisible = !outlineVisible;
  document.getElementById('outline-overlay').style.display = outlineVisible ? 'block' : 'none';
  document.getElementById('btn-outline').classList.toggle('active', !outlineVisible);
  document.getElementById('btn-outline').textContent = outlineVisible ? t('draw.sketchShow') : t('draw.sketchHide');
  renderComposite();
}
function loadOutline() {
  const src = artwork.outlineUrl;
  if (!src) return;
  const el = document.getElementById('outline-overlay');
  el.src = src;
  el.style.display = 'block';
  outlineImg = new Image();
  outlineImg.onload = () => renderComposite();
  outlineImg.src = src;
}

/* ────────────────────────────────── 합성 */
function renderComposite() {
  if (!compositeCtx) return;
  const sz = compositeCanvas.width;
  compositeCtx.clearRect(0, 0, sz, sz);
  // 흰 배경
  compositeCtx.fillStyle = '#fff'; compositeCtx.fillRect(0, 0, sz, sz);
  // 단계별 레이어 순서대로 합성
  S.stepLayerCanvases.forEach(c => compositeCtx.drawImage(c, 0, 0));
  // 도안 선을 맨 위에 multiply로 합성 (스케치가 보이는 상태일 때만)
  if (outlineImg && outlineVisible) {
    compositeCtx.save();
    compositeCtx.globalCompositeOperation = 'multiply';
    compositeCtx.globalAlpha = 0.85;
    compositeCtx.drawImage(outlineImg, 0, 0, sz, sz);
    compositeCtx.restore();
  }
}

/* ────────────────────────────────── 레이어 */
function renderLayers() {
  const list = document.getElementById('layer-list');
  if (!list) return;
  list.innerHTML = '';
  artwork.layers.forEach((l, i) => {
    const el = document.createElement('div');
    el.className = 'layer-item' + (i === S.activeLayerIdx ? ' active' : '');
    el.onclick = () => setActiveLayer(i);
    el.innerHTML = `
      <div class="l-swatch" style="background:${S.palette[i]}"></div>
      <div class="l-name">${l.name}</div>
      <div class="l-eye ${S.layerVisible[i] ? '' : 'hidden'}"
           onclick="event.stopPropagation();toggleVis(${i})">👁</div>`;
    list.appendChild(el);
  });
}
function setActiveLayer(i) {
  S.activeLayerIdx = i; S.color = S.palette[i]; S.erasing = false;
  document.getElementById('btn-eraser').classList.remove('active');
  renderLayers(); renderPalette();
}
function toggleVis(i) {
  S.layerVisible[i] = !S.layerVisible[i];
  renderComposite(); renderLayers();
}

/* ────────────────────────────────── 팔레트 */
function renderPalette() {
  const wrap = document.getElementById('palette-dots');
  wrap.innerHTML = '';
  const extra = ['#ffffff', '#f5f0e8', '#111111'].slice(0, 8 - S.palette.length);
  [...S.palette, ...extra].slice(0, 8).forEach(c => {
    const d = document.createElement('div');
    d.className = 'pal-dot' + (c === S.color ? ' active' : '');
    d.style.background = c;
    if (c === '#ffffff' || c === '#f5f0e8') d.style.border = '2.5px solid var(--border)';
    if (c === '#111111') d.style.border = '2.5px solid rgba(0,0,0,.2)';
    d.onclick = e => { e.stopPropagation(); setColor(c); };
    wrap.appendChild(d);
  });
}
function setColor(c) {
  if (S.color !== c) S.stats.colorChanges++;
  S.color = c; S.erasing = false; S.stats.usedColors.add(c);
  document.getElementById('btn-eraser').classList.remove('active');
  const dot = document.getElementById('current-color-dot');
  if (dot) dot.style.background = c;
  renderPalette();
}

/* ────────────────────────────────── 색상환 */
function drawColorWheel() {
  const canvas = document.getElementById('color-wheel');
  const ctx = canvas.getContext('2d');
  const r = canvas.width / 2;
  const bri = parseInt(document.getElementById('picker-bri').value);
  const img = ctx.createImageData(canvas.width, canvas.height);
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const dx = x - r, dy = y - r, dist = Math.sqrt(dx*dx + dy*dy);
      if (dist <= r) {
        const h = ((Math.atan2(dy, dx) / (Math.PI*2)) + 1) % 1 * 360;
        const s = (dist / r) * 100;
        const [rr, gg, bb] = hslToRgb(h, s, bri);
        const i = (y * canvas.width + x) * 4;
        img.data[i] = rr; img.data[i+1] = gg; img.data[i+2] = bb; img.data[i+3] = 255;
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h/30) % 12; return l - a * Math.max(-1, Math.min(k-3, 9-k, 1)); };
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

/* ────────────────────────────────── 드로잉 */
function bindDraw() {
  eventCanvas.onmousedown  = e => { if (panMode) { isPanning=true; panLx=e.clientX; panLy=e.clientY; } else startDraw(e); };
  eventCanvas.onmousemove  = e => { if (panMode) { if(isPanning){panX+=e.clientX-panLx;panY+=e.clientY-panLy;panLx=e.clientX;panLy=e.clientY;applyTransform();} } else onDraw(e); };
  eventCanvas.onmouseup    = e => { isPanning=false; endDraw(); };
  eventCanvas.onmouseleave = endDraw;
  eventCanvas.ontouchstart = e => { e.preventDefault(); if(e.touches.length===1 && panMode){isPanning=true;panLx=e.touches[0].clientX;panLy=e.touches[0].clientY;}else if(e.touches.length===1) startDraw(e.touches[0]); };
  eventCanvas.ontouchmove  = e => { e.preventDefault(); if(e.touches.length===1 && panMode && isPanning){panX+=e.touches[0].clientX-panLx;panY+=e.touches[0].clientY-panLy;panLx=e.touches[0].clientX;panLy=e.touches[0].clientY;applyTransform();}else if(e.touches.length===1 && !panMode) onDraw(e.touches[0]); };
  eventCanvas.ontouchend   = () => { isPanning=false; endDraw(); };
}
function getPos(e) {
  const r = eventCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (eventCanvas.width / r.width),
    y: (e.clientY - r.top)  * (eventCanvas.height / r.height),
  };
}
function saveUndo() {
  const i = currentStep - 1;
  const cvs = S.stepLayerCanvases[i];
  S.stepUndoStacks[i].push(S.stepLayerCtxs[i].getImageData(0, 0, cvs.width, cvs.height));
  if (S.stepUndoStacks[i].length > MAX_UNDO) S.stepUndoStacks[i].shift();
}
function startDraw(e) {
  drawing = true;
  strokeDist = 0; strokeStartTime = Date.now();
  const p = getPos(e); lx = p.x; ly = p.y; lmt = Date.now();
  S.stats.strokeCount++;
  S.stats.usedColors.add(S.color);
  saveUndo();
  const ctx = S.stepLayerCtxs[currentStep - 1];
  ctx.globalCompositeOperation = S.erasing ? 'destination-out' : 'source-over';
  ctx.beginPath(); ctx.arc(p.x, p.y, S.brushSize/2, 0, Math.PI*2);
  ctx.fillStyle = S.erasing ? 'rgba(0,0,0,1)' : S.color; ctx.fill();
  renderComposite();
}
function onDraw(e) {
  if (!drawing) return;
  const p = getPos(e), now = Date.now(), dt = Math.max(now - lmt, 1);
  const dist = Math.hypot(p.x - lx, p.y - ly);
  strokeDist += dist;
  S.stats.avgSpeed = S.stats.avgSpeed * 0.85 + (dist / dt) * 0.15;
  const ctx = S.stepLayerCtxs[currentStep - 1];
  ctx.globalCompositeOperation = S.erasing ? 'destination-out' : 'source-over';
  ctx.lineWidth = S.brushSize; ctx.lineCap = ctx.lineJoin = 'round';
  ctx.strokeStyle = S.erasing ? 'rgba(0,0,0,1)' : S.color;
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
  lx = p.x; ly = p.y; lmt = now;
  renderComposite();
}
function endDraw() {
  if (!drawing) return;
  drawing = false;
  const elapsed = Math.max(Date.now() - strokeStartTime, 1);
  if (!S.erasing && strokeDist > 5) {
    S.stats.lastStrokeSpeed = strokeDist / elapsed;
    if (strokeDist < 30) S.stats.patternStrokeCount++;
    analyzeAndUpdateScore();
    checkScribble();
  }
  const stepCtx = S.stepLayerCtxs[currentStep - 1];
  if (stepCtx) stepCtx.globalCompositeOperation = 'source-over';
}

/* ────────────────────────────────── 낙서 감지 */
let scribbleWarned = false;

function checkScribble() {
  if (scribbleWarned) return;
  if (S.stats.strokeCount < 4) return;            // 획 수가 적으면 패스
  if (S.stats.usedColors.size > 2) return;         // 색을 다양하게 쓰면 패스
  if (S.stats.lastStrokeSpeed < 2.8) return;       // 빠르지 않으면 패스
  if (S.stats.avgSpeed < 1.5) return;              // 평균 속도도 빠를 때만
  const px = sampleCanvas();
  if (px.areaFill < 0.08) return;                  // 너무 적게 그렸으면 패스
  scribbleWarned = true;
  showScribblePopup();
}

function showScribblePopup() {

  document.getElementById('scribble-msg').innerHTML        = t('scribble.msg');
  document.getElementById('btn-scribble-reset').textContent    = t('scribble.reset');
  document.getElementById('btn-scribble-continue').textContent = t('scribble.continue');

}

function dismissScribble() {

}

function resetFromScribble() {
  dismissScribble();
  // 현재 단계 캔버스만 초기화
  const idx = currentStep - 1;
  const ctx = S.stepLayerCtxs[idx];
  ctx.clearRect(0, 0, S.stepLayerCanvases[idx].width, S.stepLayerCanvases[idx].height);
  S.stepUndoStacks[idx] = [];
  // 통계 초기화
  S.stats = { strokeCount:0, colorChanges:0, usedColors:new Set(), avgSpeed:0, lastAlertAt:0, patternStrokeCount:0, lastStrokeSpeed:0 };
  emotionScore = 0;
  scribbleWarned = false; // 다시 감지 가능
  renderComposite(); updateScoreDisplay();
}

/* ────────────────────────────────── 감정 스코어 시스템 */

const EMOTION_RULES = {
  joy:        { speed:[0.4,0.8], pressure:[0.3,0.6], thickness:[0.4,0.7], colorVariety:[0.6,1.0], colorMatch:[0.5,1.0], pattern:[0.5,1.0], areaFill:[0.4,0.9], core:'colorVariety' },
  calm:       { speed:[0.1,0.4], pressure:[0.1,0.4], thickness:[0.2,0.4], colorVariety:[0.2,0.5], colorMatch:[0.6,1.0], pattern:[0.2,0.5], areaFill:[0.3,0.7], core:'speed' },
  confidence: { speed:[0.3,0.6], pressure:[0.6,1.0], thickness:[0.6,1.0], colorVariety:[0.3,0.6], colorMatch:[0.6,1.0], pattern:[0.4,0.8], areaFill:[0.5,1.0], core:'pressure' },
  curiosity:  { speed:[0.2,0.9], pressure:[0.2,0.9], thickness:[0.2,0.9], colorVariety:[0.7,1.0], colorMatch:[0.3,1.0], pattern:[0.6,1.0], areaFill:[0.3,1.0], core:'colorVariety' },
  love:       { speed:[0.2,0.7], pressure:[0.2,0.6], thickness:[0.3,0.6], colorVariety:[0.5,1.0], colorMatch:[0.6,1.0], pattern:[0.6,1.0], areaFill:[0.4,0.9], core:'pattern' },
};

const WEIGHTS = {
  speed:0.20, pressure:0.15, thickness:0.10,
  colorVariety:0.15, colorMatch:0.15, pattern:0.10, areaFill:0.15,
};

function scoreFeature(value, min, max) {
  if (value >= min && value <= max) return 100;
  const distance = Math.min(Math.abs(value - min), Math.abs(value - max));
  return Math.max(0, 100 - distance * 120);
}

function sampleCanvas() {
  if (!compositeCanvas) return { areaFill: 0, colorMatch: 0 };
  let imageData;
  try { imageData = compositeCtx.getImageData(0, 0, compositeCanvas.width, compositeCanvas.height); }
  catch(e) { return { areaFill: 0, colorMatch: 0 }; }
  const data = imageData.data;
  const palRgb = S.palette.map(p => hexToRgb(p));
  const STEP = 8;
  let sampled = 0, painted = 0, toneMatch = 0;
  for (let i = 0; i < data.length; i += 4 * STEP) {
    sampled++;
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    if (a < 20 || (r > 240 && g > 240 && b > 240)) continue;
    painted++;
    for (const pc of palRgb) {
      if (Math.sqrt((r-pc.r)**2+(g-pc.g)**2+(b-pc.b)**2) < 80) { toneMatch++; break; }
    }
  }
  return {
    areaFill:   painted / Math.max(sampled, 1),
    colorMatch: painted > 20 ? toneMatch / painted : 0,
  };
}

function extractFeatures() {
  const st = S.stats;
  const px = sampleCanvas();
  return {
    speed:        Math.min(1, st.lastStrokeSpeed / 1.0),   // 1.0px/ms = 만점
    pressure:     Math.min(1, S.brushSize / 40),           // brushSize로 대리
    thickness:    Math.min(1, S.brushSize / 40),
    colorVariety: Math.min(1, st.usedColors.size / 8),
    colorMatch:   px.colorMatch,
    pattern:      st.strokeCount > 0 ? Math.min(1, st.patternStrokeCount / st.strokeCount) : 0,
    areaFill:     px.areaFill,
  };
}

function calculateEmotionScore(features) {
  const rule = EMOTION_RULES[emotion.id];
  if (!rule) return 0;

  // areaFill 제외한 감정 특징 점수
  const qualityKeys = ['speed', 'pressure', 'thickness', 'colorVariety', 'colorMatch', 'pattern'];
  const qualityWeightSum = qualityKeys.reduce((s, k) => s + WEIGHTS[k], 0);
  let qualityScore = 0;
  for (const key of qualityKeys) {
    let score = scoreFeature(features[key], rule[key][0], rule[key][1]);
    if (key === rule.core) score = Math.min(110, score * 1.1);
    qualityScore += score * (WEIGHTS[key] / qualityWeightSum);
  }

  // areaFill은 곱셈 승수: 캔버스를 채울수록 점수가 쌓임
  // 0.2(20% 채움 ≈ 25~30획) 기준으로 최대 1.0
  const fillMultiplier = Math.min(1, features.areaFill / 0.2);
  return Math.min(100, Math.round(qualityScore * fillMultiplier));
}

function getFeedback(features) {
  const rule = EMOTION_RULES[emotion.id];
  if (!rule) return null;
  if (currentStep === 2) {
    if (features.colorMatch < 0.4) return t('fb.color');
    if (features.areaFill < 0.3)   return t('fb.fill');
  }
  if (emotion.id === 'love' && features.pattern < 0.5)      return t('fb.lovePattern');
  if (emotion.id === 'love' && features.colorVariety < 0.5) return t('fb.loveColor');
  if (emotion.id === 'calm' && features.speed > 0.5)        return t('fb.calmSpeed');
  if (emotion.id === 'confidence' && features.thickness < 0.5) return t('fb.confidenceThick');
  if (emotion.id === 'curiosity' && features.colorVariety < 0.5) return t('fb.curiosityColor');
  if (currentStep === 3 && features.pattern < 0.3) return t('fb.pattern', tPattern(emotion.id));
  return null;
}

function analyzeAndUpdateScore() {
  const features = extractFeatures();
  const raw = calculateEmotionScore(features);
  // 단계별 획 수 기반 점수 증가 제어
  if (currentStep === 1) {
    // 1단계: 최대 35%, 30획 기준으로 서서히
    const strokeProgress = Math.min(1, S.stats.strokeCount / 30);
    emotionScore = Math.round(raw * strokeProgress * 0.35);
  } else if (currentStep === 2) {
    // 2단계: 이 단계에서 그린 획 수 기준, 40획에 걸쳐 서서히 100%까지
    const stepStrokes = S.stats.strokeCount - stepStartStrokeCount;
    const strokeProgress = Math.min(1, stepStrokes / 40);
    const prev = emotionScore; // 1단계 누적 점수 유지
    emotionScore = Math.max(prev, Math.round(prev + (raw - prev) * strokeProgress));
  } else {
    emotionScore = raw;
  }
  updateScoreDisplay();

  // 전 단계 AI 튜터 피드백 (쿨다운 있음)
  const fb = getFeedback(features);
  if (fb && Date.now() - S.stats.lastAlertAt > 6000) {
    addBubble(fb);
    S.stats.lastAlertAt = Date.now();
  }
}

function updateScoreDisplay() {
  const fill = document.getElementById('sh-fill');
  const pct  = document.getElementById('sh-pct');
  if (fill) fill.style.width = emotionScore + '%';
  if (pct)  pct.textContent  = emotionScore + '%';
  const hint = document.getElementById('sh-hint');
  if (hint) hint.textContent = '';
  refreshStep2UI();
}

function updateScore() { updateScoreDisplay(); }

/* ────────────────────────────────── 단계 시스템 */
let currentStep = 1;
let maxStepReached = 1;
let stepStartStrokeCount = 0; // 각 단계 시작 시점의 획 수

const STEPS = [
  {
    title: () => t('draw.step1Title'),
    desc:  () => t('draw.step1Desc'),
    btnLabel: () => t('draw.step1Next'),
    hint: '',
    canNext: () => true,
  },
  {
    title: () => t('draw.step2Title', tEmotion(emotion.id)),
    desc:  () => (t('draw.step2Desc')[emotion.id] || t('draw.step2Desc').joy),
    btnLabel: () => t('draw.step2Next'),
    hint:  () => t('draw.step2Hint', tEmotion(emotion.id)),
    canNext: () => emotionScore >= 60,
  },
  {
    title: () => t('draw.step3Title', tEmotion(emotion.id)),
    desc:  () => t('draw.step3Desc', tPattern(emotion.id)),
    btnLabel: () => t('draw.step3Next'),
    hint: '',
    canNext: () => true,
  },
];

function initSteps() {
  currentStep = 1;
  maxStepReached = 1;
  renderStep();
}

function renderStep() {
  const s = STEPS[currentStep - 1];
  const title    = typeof s.title    === 'function' ? s.title()    : s.title;
  const desc     = typeof s.desc     === 'function' ? s.desc()     : s.desc;
  const hint     = typeof s.hint     === 'function' ? s.hint()     : s.hint;
  const btnLabel = typeof s.btnLabel === 'function' ? s.btnLabel() : s.btnLabel;
  const canNext = s.canNext();

  document.getElementById('step-title').textContent = title;
  document.getElementById('step-desc').textContent  = desc;
  document.getElementById('step-score-hint').innerHTML = hint;

  const btn = document.getElementById('step-next-btn');
  btn.textContent = btnLabel;
  btn.disabled = !canNext;

  // 트래커 업데이트
  [1,2,3].forEach(n => {
    const dot = document.getElementById(`sdot-${n}`);
    dot.classList.remove('active','done','reachable');
    if (n === currentStep)      dot.classList.add('active');
    else if (n <= maxStepReached) { dot.classList.add('done'); dot.classList.add('reachable'); }
  });
  [1,2].forEach(n => {
    document.getElementById(`sline-${n}`).classList.toggle('done', n < currentStep);
  });

  // 2단계: 스케치 자동 표시
  if (currentStep === 1) {
    document.getElementById('outline-overlay').style.display = 'block';
    outlineVisible = true;
    document.getElementById('btn-outline').classList.remove('active');
    document.getElementById('btn-outline').textContent = t('draw.sketchShow');
  }
  // 3단계: 스케치 숨기고 자유 꾸미기
  if (currentStep === 3) {
    document.getElementById('outline-overlay').style.display = 'none';
    outlineVisible = false;
    document.getElementById('btn-outline').classList.add('active');
    document.getElementById('btn-outline').textContent = t('draw.sketchHide');
    addBubble(t('draw.bubbleStep3', tPattern(emotion.id)));
  }
}

function nextStep() {
  if (currentStep === 3) { confirmFinish(); return; }
  currentStep++;
  maxStepReached = Math.max(maxStepReached, currentStep);
  if (currentStep === 2) {
    scribbleWarned = false;
    stepStartStrokeCount = S.stats.strokeCount;
    addBubble(t('draw.bubbleStep2', tEmotion(emotion.id)));
  }
  renderStep();
}

// 이전 단계로 이동하여 해당 레이어 수정
function goToStep(n) {
  if (n > maxStepReached) return; // 아직 도달하지 않은 단계
  currentStep = n;
  renderStep();
}

function refreshStep2UI() {
  if (currentStep !== 2) return;
  const s = STEPS[1];
  const hint = typeof s.hint === 'function' ? s.hint() : s.hint;
  document.getElementById('step-score-hint').innerHTML = hint;
  document.getElementById('step-next-btn').disabled = !s.canNext();
}

function confirmFinish() {
  try {
    if (compositeCanvas) {
      sessionStorage.setItem('resultDataUrl', compositeCanvas.toDataURL('image/png'));
    }
    sessionStorage.setItem('resultStats', JSON.stringify({
      strokeCount: S.stats.strokeCount,
      colorChanges: S.stats.colorChanges,
      usedColorCount: S.stats.usedColors.size,
      avgSpeed: S.stats.avgSpeed,
    }));
    sessionStorage.setItem('emotionScore', emotionScore);
    const elapsedSec = Math.max(1, Math.round((Date.now() - _drawStartTime) / 1000));
    sessionStorage.setItem('drawingSeconds', elapsedSec);
  } catch(e) { console.warn('finish save error', e); }
  location.href = 'end.html';
}

    wrap = document.createElement('div');
    wrap.id = 'yt-music-wrap';
    wrap.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(wrap);
    const div = document.createElement('div');
    div.id = 'yt-player';
    wrap.appendChild(div);
  }
  ytPlayer = new YT.Player('yt-player', {
    videoId,
    playerVars: { autoplay: 1, loop: 1, playlist: videoId, controls: 0, disablekb: 1 },
    events: {
      onReady: (e) => { e.target.setVolume(28); onReady && onReady(); },
      onStateChange: (e) => {
        // 재생 중이면 아이콘 유지
        if (e.data === YT.PlayerState.PLAYING) {
          musicPlaying = true;
          setMusicBtn(true);
        }
      },
    },
  });
}

function setMusicBtn(on) {
  const btn  = document.getElementById('btn-music');
  const icon = document.getElementById('music-icon');
  btn.classList.toggle('active', on);
  btn.classList.toggle('music-on', on);
  btn.style.background = on ? emotion.gradient : '';
  btn.style.border     = on ? 'none' : '';
  icon.textContent = on ? '🔊' : '🎵';
}

function toggleMusic() {
  const btn = document.getElementById('btn-music');

  if (musicPlaying) {
    // 정지
    if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
    musicPlaying = false;
    setMusicBtn(false);
    return;
  }

  // 재생
  if (ytPlayer && ytPlayer.playVideo) {
    ytPlayer.playVideo();
    musicPlaying = true;
    setMusicBtn(true);
    return;
  }

  // 첫 생성
  if (!ytReady) {
    // API 아직 미로드 → 잠시 후 재시도
    btn.textContent = '⏳';
    const wait = setInterval(() => {
      if (ytReady) {
        clearInterval(wait);
        document.getElementById('music-icon').textContent = '🎵';
        toggleMusic();
      }
    }, 300);
    return;
  }

  const videoId = MUSIC_MAP[emotion.id];
  if (!videoId) return;
  createYTPlayer(videoId, () => {
    musicPlaying = true;
    setMusicBtn(true);
  });
}

// 페이지 떠날 때 음악 정지
window.addEventListener('pagehide', () => { if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo(); });

const _drawStartTime = Date.now();
init();

// 음악 툴팁: 5초 후 등장, 3초 지속 후 페이드아웃
setTimeout(() => {
  const btn = document.getElementById('btn-music');
  const tip = document.getElementById('music-tooltip');
  if (!btn || !tip) return;
  const tipTextEl = document.getElementById('music-tooltip-text');
  if (tipTextEl) {
    tipTextEl.innerHTML = t('draw.musicTooltip');
  } else {
    const tail = tip.querySelector('#music-tooltip-tail');
    tip.innerHTML = t('draw.musicTooltip');
    if (tail) tip.appendChild(tail);
  }
  const r = btn.getBoundingClientRect();
  tip.style.display = 'block';
  tip.style.left = (r.right + 10) + 'px';
  tip.style.top  = (r.top + r.height / 2 - tip.offsetHeight / 2) + 'px';
  setTimeout(() => {
    tip.style.opacity = '0';
    setTimeout(() => tip.style.display = 'none', 400);
  }, 3000);
}, 5000);
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>아트플로우 — AI 마음튜터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
<style>
@font-face {
  font-family: 'MilkChoco';
  src: url('Milk Choco.otf') format('opentype');
}
.landing-logo {
  font-family: 'MilkChoco', sans-serif !important;
  font-size: clamp(4rem, 13vw, 7rem) !important;
  letter-spacing: 0 !important;
  font-weight: normal !important;
}
/* ── 언어 선택 ── */
.lang-switcher {
  position: absolute;
  top: 18px; right: 18px;
  z-index: 10;
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 4px;
}
.lang-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.55);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 5px 11px;
  border-radius: 24px;
  cursor: pointer;
  transition: background .18s, color .18s;
  letter-spacing: 0.02em;
}
.lang-btn.active {
  background: rgba(255,255,255,0.22);
  color: #fff;
}
/* ── 붓 글씨 애니메이션 ── */
@keyframes brushChar {
  from {
    clip-path: inset(0 105% 0 0);
    filter: blur(8px);
    opacity: 0;
  }
  40% {
    opacity: 1;
  }
  75% {
    filter: blur(0.8px);
  }
  to {
    clip-path: inset(0 0% 0 0);
    filter: blur(0);
    opacity: 1;
  }
}
.logo-char {
  display: inline-block;
  animation: brushChar 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  white-space: pre;
}
</style>
</head>
<body>

<div class="landing-page">
  <video class="landing-bg-video" src="drawing_process.mov" autoplay loop muted playsinline></video>
  <div class="landing-overlay"></div>

  <!-- 언어 선택 -->
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ja')">JA</button>
  </div>

  <div class="landing-content">
    <div class="tag-row" id="tag-row"></div>
    <div class="landing-logo" id="landing-logo"></div>
    <p class="landing-sub" id="landing-sub">쉽게 따라만 그리면 행복해지는 아트 플로우</p>
    <p class="landing-desc" id="landing-desc">
      같은 그림도 마음에 따라 다르게 완성!<br>
      더 행복한 마음을 느낄 수 있도록
      <strong style="color:#a78bfa;" id="landing-tutor">AI 마음튜터</strong>가 도와줄게요.
    </p>
    <button class="btn btn-primary" id="landing-cta" onclick="location.href='choosing_drawing.html'">시작하기</button>
  </div>
</div>

<script src="i18n.js?v=2"></script>
<script src="data.js"></script>
<script>
// 붓 글씨 애니메이션
(function() {
  const logo = document.getElementById('landing-logo');
  logo.innerHTML = [...'Art Flow'].map((ch, i) =>
    `<span class="logo-char" style="animation-delay:${0.3 + i * 0.18}s">${ch === ' ' ? '&nbsp;' : ch}</span>`
  ).join('');
})();

function applyLanding(lang) {
  saveLang(lang);
  document.getElementById('landing-sub').textContent = t('landing.sub');
  document.getElementById('landing-desc').innerHTML =
    t('landing.desc') + ' <strong style="color:#a78bfa;">' + t('landing.tutor') + '</strong>' + t('landing.tutorSuffix');
  document.getElementById('landing-cta').textContent = t('landing.cta');

  const row = document.getElementById('tag-row');
  row.innerHTML = '';
  EMOTIONS.forEach(e => {
    const tag = document.createElement('span');
    tag.className = 'emotion-tag';
    tag.style.background = e.gradient;
    tag.textContent = tEmotion(e.id);
    row.appendChild(tag);
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
  });
}

function setLang(lang) { applyLanding(lang); }

applyLanding(getLang());
</script>
</body>
</html>

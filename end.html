<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>완성! — 아트플로우</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="end-page">
  <canvas id="anim-canvas"></canvas>
  <div class="result-inner">
    <div class="result-title" id="result-title">완성!</div>
    <div class="result-badge" id="result-badge">마음</div>
    <div class="result-canvas-wrap">
      <canvas id="result-canvas"></canvas>
    </div>
    <div class="result-card">
      <div class="rc-main" id="rc-main"></div>
      <div class="rc-score" id="rc-score"></div>
      <div class="rc-detail" id="rc-detail"></div>
      <div class="rc-cheer" id="rc-cheer"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="btn-redraw" onclick="location.href='choosing_drawing.html'">다시 그리기</button>
      <button class="btn btn-primary" id="btn-browse" onclick="openBrowseModal()">구경하기</button>
      <button class="btn btn-primary" id="btn-share-open" onclick="openShareModal()">공유하기</button>
    </div>
  </div>
</div>

<!-- 구경하기 모달 -->
<div class="modal-overlay" id="browse-modal">
  <div class="modal-box" style="position:relative;">
    <button class="modal-x" onclick="closeBrowseModal()">✕</button>
    <div style="font-size:2rem;margin-bottom:12px;">🎨</div>
    <h3 id="browse-modal-title" style="margin-bottom:10px;">친구들 그림 구경하기</h3>
    <p id="browse-modal-desc" style="font-size:.88rem;color:var(--text2);line-height:1.6;margin-bottom:20px;">나와 같은 그림과 같은 마음을 가진<br>친구들의 그림을 감상해보세요.</p>
    <div class="modal-actions" style="flex-direction:column;gap:8px;">
      <button class="btn btn-primary" id="btn-browse-ok" onclick="location.href='gallery.html'">확인</button>
    </div>
  </div>
</div>

<!-- 공유 모달 -->
<div class="modal-overlay" id="share-modal">
  <div class="modal-box">
    <h3 id="share-modal-title">그림 공유하기</h3>
    <p id="share-modal-quote">"같은 그림도 내 마음대로 완성했어요"</p>
    <img id="share-preview" class="modal-preview" src="" alt="">
    <div class="modal-actions">
      <button class="btn btn-primary" id="btn-save-png" onclick="downloadImage()">PNG 저장</button>
      <button class="btn btn-outline" id="btn-copy-msg" onclick="copyShareMsg()">공유 메시지 복사</button>
    </div>
    <button class="modal-close" id="btn-close-share" onclick="closeShareModal()">닫기</button>
  </div>
</div>

<script>if(performance.getEntriesByType("navigation")[0]?.type==="reload"){location.replace("landing.html");}</script>
<script src="i18n.js"></script>
<script src="data.js"></script>
<script>
const artwork = getArtwork();
const emotion = getEmotion();
const resultDataUrl = sessionStorage.getItem('resultDataUrl');
const statsRaw = sessionStorage.getItem('resultStats');
const stats = statsRaw ? JSON.parse(statsRaw) : { usedColorCount: 1, avgSpeed: 0.5 };
const emotionScore = parseInt(sessionStorage.getItem('emotionScore') || '0', 10);
const drawingMinutes = parseInt(sessionStorage.getItem('drawingMinutes') || '1', 10);

if (!artwork || !emotion) location.href = 'choosing_drawing.html';

let resultCanvas;

/* ── 결과 초기화 ── */
function initResult() {
  const eName = tEmotion(emotion.id);

  // 정적 UI 텍스트 번역

  document.getElementById('btn-redraw').textContent      = t('end.redraw');

  document.getElementById('browse-modal-desc').innerHTML = t('end.browseDesc');
  document.getElementById('btn-browse-ok').textContent   = t('end.browseOk');
  document.getElementById('share-modal-title').textContent = t('end.shareTitle');
  document.getElementById('share-modal-quote').textContent = t('end.shareQuote');

  document.getElementById('btn-copy-msg').textContent    = t('end.copyMsg');

      { main: '즐거움이 그림 곳곳에 넘쳐흘러요!', detail: '다양한 색과 경쾌한 선이 즐거운 마음을 훌륭하게 표현했어요.', cheer: '정말 밝고 신나는 그림이에요! 멋져요 🎉' },
      { main: '그림 전체가 즐거움으로 가득 빛나고 있어요!', detail: '생동감 넘치는 색감과 경쾌한 선이 기쁨을 완벽하게 담아냈어요.', cheer: '최고로 신나는 그림 탄생! 최고예요 🏆' },
    ],
    calm: [
      { main: '편안함을 느끼려고 노력했어요!', detail: '조금 더 천천히, 부드러운 곡선으로 그려보면 차분함이 더 잘 표현돼요.', cheer: '천천히, 차근차근 다시 해봐요 🌿' },
      { main: '차분한 마음이 조금씩 그림에 스며들고 있어요!', detail: '속도를 더 늦추고 여백을 살리면 편안함이 한층 깊어질 거예요.', cheer: '잘 하고 있어요! 더 여유롭게 🌊' },
      { main: '부드럽고 평화로운 마음이 그림에 잘 담겼어요!', detail: '천천히 그린 선들이 보는 사람의 마음도 편안하게 해줘요.', cheer: '마음이 따뜻해지는 그림이에요 💙' },
      { main: '그림에서 깊고 조용한 평화가 느껴져요!', detail: '부드러운 색감과 여유로운 흐름이 완벽한 편안함을 만들었어요.', cheer: '마음이 고요해지는 최고의 그림이에요 🌸' },
    ],
    confidence: [

      { main: '그림 전체에서 강하고 당당한 에너지가 뿜어져 나와요!', detail: '힘 있는 선과 선명한 색감이 완벽한 자신감을 담아냈어요.', cheer: '최고로 당당한 작품이에요! 대단해요 🏆' },
    ],

      { main: '그림 곳곳에서 호기심 가득한 에너지가 느껴져요!', detail: '다채로운 색과 자유로운 선이 탐구하는 마음을 잘 담아냈어요.', cheer: '정말 흥미로운 그림이에요! 멋져요 ✨' },

    ],
    love: [
      { main: '설레는 마음을 그리기 시작했어요!', detail: '더 부드럽고 따뜻한 색으로 그려보면 설레임이 더 잘 느껴질 거예요.', cheer: '조금 더 따뜻하게, 할 수 있어요 💕' },
      { main: '따뜻하고 설레는 마음이 그림에 조금씩 담기고 있어요!', detail: '더 부드러운 선과 따뜻한 색을 써보면 더 예뻐질 거예요.', cheer: '잘하고 있어요! 더 사랑스럽게 🌸' },
      { main: '그림에서 따뜻하고 설레는 마음이 전해져요!', detail: '부드러운 색감과 따뜻한 선이 설레임을 예쁘게 담아냈어요.', cheer: '정말 따뜻한 그림이에요! 사랑스러워요 💖' },
      { main: '그림 전체에서 사랑스럽고 설레는 감정이 넘쳐흘러요!', detail: '따뜻한 색감과 부드러운 선이 설레임을 완벽하게 표현했어요.', cheer: '가장 아름다운 마음의 그림이에요 🌹' },
    ],
  };

  function getScoreTier(score) {
    if (score <= 40) return 0;
    if (score <= 65) return 1;
    if (score <= 85) return 2;
    return 3;
  }

  const tier = getScoreTier(emotionScore);
  const msg  = RESULT_MSG[emotion.id]?.[tier] || RESULT_MSG.joy[1];

  // 점수 문구
  document.getElementById('rc-score').textContent =
    `오늘 ${drawingMinutes}분 동안 ${eName} ${emotionScore}% 채워졌어요!`;

  document.getElementById('rc-main').textContent   = msg.main;
  document.getElementById('rc-detail').textContent = msg.detail;

  // 응원 문구
  document.getElementById('rc-cheer').textContent = msg.cheer;

  // 팔레트 계산 후 애니메이션
  const emotionImg = artwork.emotionImages?.[emotion.id];
  const palette = emotionImg
    ? emotionImg.palette
    : artwork.layers.map((l, i) => emotion.transform(l.color, i));
  startResultAnim(emotion.anim, palette);
}

/* ── 결과 애니메이션 ── */
let animRAF = null, animParticles = [];

function startResultAnim(type, palette) {
  const cvs = document.getElementById('anim-canvas');
  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  const ctx = cvs.getContext('2d');
  if (animRAF) cancelAnimationFrame(animRAF);
  animParticles = Array.from({length: 36}, () => mkParticle(type, cvs.width, cvs.height, palette));
  const loop = () => {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    animParticles.forEach((p, i) => {
      moveParticle(p, type); drawParticle(ctx, p, type);
      if (p.y > cvs.height + 30 || p.y < -30 || p.x < -30 || p.x > cvs.width + 30 || p.age > p.life)
        animParticles[i] = mkParticle(type, cvs.width, cvs.height, palette);
    });
    animRAF = requestAnimationFrame(loop);
  };
  loop();
}

function mkParticle(type, w, h, palette) {
  const color = palette[Math.floor(Math.random() * palette.length)];
  if (type==='hearts') return {x:Math.random()*w,y:h+10,vx:(Math.random()-.5)*.6,vy:-(0.5+Math.random()*1.2),size:6+Math.random()*14,alpha:.5+Math.random()*.4,color,rot:(Math.random()-.5)*30,wobble:Math.random()*Math.PI*2,wobbleSpeed:.02+Math.random()*.02,age:0,life:999};
  if (type==='stars')  return {x:Math.random()*w,y:Math.random()*h+h*.3,vx:(Math.random()-.5)*.4,vy:-(0.3+Math.random()*.6),size:3+Math.random()*10,alpha:.4+Math.random()*.5,color,rot:Math.random()*360,rotv:(Math.random()-.5)*3,age:0,life:999};
  if (type==='waves')  return {x:Math.random()*w,y:h*.3+Math.random()*h*.4,vx:.3+Math.random()*.4,vy:0,size:4+Math.random()*8,alpha:.2+Math.random()*.3,color,phase:Math.random()*Math.PI*2,age:0,life:999};
  if (type==='glow')   return {x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,size:8+Math.random()*16,alpha:.1+Math.random()*.2,color,age:0,life:999};
  if (type==='dots')   return {x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,size:3+Math.random()*7,alpha:.4+Math.random()*.5,color,age:0,life:60+Math.random()*60};
  if (type==='burst')  return {x:Math.random()*w,y:h+10,vx:(Math.random()-.5)*3,vy:-(2+Math.random()*4),size:5+Math.random()*10,alpha:.6+Math.random()*.4,color,gravity:.07,age:0,life:999};
  return {x:Math.random()*w,y:Math.random()*h,vx:.3,vy:-.3,size:5,alpha:.4,color,age:0,life:999};
}

function moveParticle(p, type) {
  p.age++;
  if (type==='hearts') { p.wobble+=p.wobbleSpeed; p.x+=p.vx+Math.sin(p.wobble)*.5; p.y+=p.vy; if(p.y<-p.size*2) p.y=window.innerHeight+10; }
  else if (type==='waves')  { p.x+=p.vx; p.y+=Math.sin(p.x*.02+p.phase)*.5; }
  else if (type==='burst') { p.vy+=p.gravity; p.x+=p.vx; p.y+=p.vy; }
  else if (type==='dots')  { p.x+=p.vx; p.y+=p.vy; p.alpha=.5*(1-p.age/p.life); }
  else if (type==='stars') { p.x+=p.vx; p.y+=p.vy; p.rot+=(p.rotv||0); }
  else { p.x+=p.vx; p.y+=p.vy; }
}

function drawParticle(ctx, p, type) {
  ctx.save(); ctx.globalAlpha = Math.max(0, p.alpha);
  if (type==='hearts') {
    const s = p.size;
    ctx.translate(p.x, p.y); ctx.rotate((p.rot||0)*Math.PI/180);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(0, s * 0.3);
    ctx.bezierCurveTo(0, 0,  -s, 0,  -s, s * 0.4);
    ctx.bezierCurveTo(-s, s * 0.85, 0, s * 1.15, 0, s * 1.3);
    ctx.bezierCurveTo(0, s * 1.15,  s, s * 0.85,  s, s * 0.4);
    ctx.bezierCurveTo(s, 0,  0, 0,  0, s * 0.3);
    ctx.closePath(); ctx.fill();
  } else if (type==='stars') {
    ctx.translate(p.x, p.y); ctx.rotate((p.rot||0)*Math.PI/180);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    for (let i=0; i<10; i++) {
      const r = i%2===0 ? p.size : p.size*.45;
      const a = (i*Math.PI)/5 - Math.PI/2;
      i===0 ? ctx.moveTo(r*Math.cos(a), r*Math.sin(a)) : ctx.lineTo(r*Math.cos(a), r*Math.sin(a));
    }
    ctx.closePath(); ctx.fill();
  } else if (type==='glow') {
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
    g.addColorStop(0, p.color+'cc'); g.addColorStop(1, p.color+'00');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ── 구경하기 ── */
function openBrowseModal()  { document.getElementById('browse-modal').classList.add('open'); }
function closeBrowseModal() { document.getElementById('browse-modal').classList.remove('open'); }

/* ── 공유 ── */
let _shareDataUrl = null;

async function buildShareImage() {
  const inner   = document.querySelector('.result-inner');
  const actions = document.querySelector('.result-actions');
  const animCvs = document.getElementById('anim-canvas');

  // 버튼 행 + 배경 애니메이션 캔버스 숨기기
  actions.style.visibility = 'hidden';
  actions.style.height = '0';
  animCvs.style.display = 'none';

  const canvas = await html2canvas(inner, {
    backgroundColor: '#faf9ff',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
  });

  // 복원
  actions.style.visibility = '';
  actions.style.height = '';
  animCvs.style.display = '';

  return canvas.toDataURL('image/png');
}

async function openShareModal() {
  const url = await buildShareImage();
  _shareDataUrl = url;
  document.getElementById('share-preview').src = url;
  document.getElementById('share-modal').classList.add('open');
}
function closeShareModal() { document.getElementById('share-modal').classList.remove('open'); }
async function downloadImage() {
  const url = _shareDataUrl || await buildShareImage();
  const a = document.createElement('a');
  a.href = url;
  a.download = '아트플로우_내그림.png'; a.click();
}
function copyShareMsg() {
  const msg = t('end.copyMsgText', emotion.icon, tArtwork(artwork.id), tEmotion(emotion.id));
  if (navigator.clipboard) navigator.clipboard.writeText(msg).then(() => alert('복사됐어요!'));
  else alert(msg);
}

window.addEventListener('resize', () => {
  const cvs = document.getElementById('anim-canvas');
  if (cvs) { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
});

initResult();
</script>
